# Cloudflare deployment config.
# The site is fully static. Cloudflare's Git build runs `npx wrangler deploy`,
# so this uses the Workers Static Assets format: it just uploads the built
# `dist/` folder. Build command (`npm run build`) and Node version are set in
# the Cloudflare dashboard — see README.md → Deployment.
name = "carpenters-web"
compatibility_date = "2025-05-01"

[assets]
directory = "./dist"
